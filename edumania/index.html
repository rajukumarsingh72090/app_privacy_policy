<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Policies for Edumania Application">
    <title>Edumania Policies</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
            font-size: 1.1rem;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .back-link svg {
            width: 20px;
            height: 20px;
            margin-right: 0.5rem;
            transition: transform 0.3s ease;
        }

        .back-link:hover svg {
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="container">
        <div style="width: 100%; max-width: 800px; padding-top: 2rem;">
            <a href="../index.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to All Apps
            </a>
        </div>
        <header>
            <h1>Edumania Policies</h1>
            <p>Access the privacy and account deletion policies for the Edumania application.</p>
        </header>

        <main id="policy-grid" class="policy-grid">
            <!-- Cards will be injected by JavaScript -->
        </main>
        
        <footer>
            <p>&copy; 2026 Raju Kumar Singh. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
